<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אוסטריה 2026 · טיול משפחתי</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            alpine: {50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e'}
          },
          fontFamily: {sans: ['Heebo', 'system-ui', 'sans-serif']}
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800">
  <nav class="fixed top-0 inset-x-0 z-50 bg-white/90 backdrop-blur border-b">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="#" class="font-bold text-alpine-800 text-lg">🏔️ אוסטריה 2026</a>
    </div>
  </nav>

  <header class="pt-24 pb-16 px-4 text-white text-center" style="background: linear-gradient(135deg, #0c4a6e, #0ea5e9);">
    <h1 class="text-4xl md:text-5xl font-extrabold mb-4">אוסטריה · קיץ משפחתי</h1>
    <p class="text-xl mb-8">וינה · עמק הצילר · חבל זלצבורג</p>
    <div id="countdown" class="flex justify-center gap-6">
      <div><div class="text-3xl font-bold" id="d">--</div><div class="text-xs">ימים</div></div>
      <div><div class="text-3xl font-bold" id="h">--</div><div class="text-xs">שעות</div></div>
      <div><div class="text-3xl font-bold" id="m">--</div><div class="text-xs">דקות</div></div>
    </div>
  </header>

  <section class="max-w-5xl mx-auto px-4 py-12">
    <h2 class="text-3xl font-bold text-center mb-8">מקומות מרכזיים</h2>

    <h3 class="text-xl font-bold text-green-700 mb-4">🏔️ טירול</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Wattens_-_Swarovski_Kristallwelten.jpg/640px-Wattens_-_Swarovski_Kristallwelten.jpg" class="w-full h-48 object-cover" alt="Swarovski">
        <div class="p-4">
          <h3 class="font-bold">Swarovski Kristallwelten</h3>
          <a href="https://www.swarovski.com/en-GB/" target="_blank" class="text-xs text-alpine-600 underline">אתר</a>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Zillertal_Austria.jpg/640px-Zillertal_Austria.jpg" class="w-full h-48 object-cover" alt="Zillertal">
        <div class="p-4">
          <h3 class="font-bold">צילרטאל</h3>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Silver_mine_Schwaz.jpg/640px-Silver_mine_Schwaz.jpg" class="w-full h-48 object-cover" alt="Silver Mine" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Silver_mine_Schwaz.jpg/640px-Silver_mine_Schwaz.jpg'">
        <div class="p-4">
          <h3 class="font-bold">מכרה הכסף</h3>
          <a href="https://www.silberbergwerk.at/" target="_blank" class="text-xs text-alpine-600 underline">אתר</a>
        </div>
      </div>
    </div>

    <h3 class="text-xl font-bold text-purple-700 mb-4">🌲 זלצבורג</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Krimmler_Wasserf%C3%A4lle.jpg/640px-Krimmler_Wasserf%C3%A4lle.jpg" class="w-full h-48 object-cover" alt="Krimml" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/5/5d/Krimmler_Wasserf%C3%A4lle.jpg'">
        <div class="p-4">
          <h3 class="font-bold">מפלי קרימל</h3>
          <a href="https://www.krimml-wasserwelten.at/" target="_blank" class="text-xs text-alpine-600 underline">אתר</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-slate-900 text-white py-8 text-center">
    <p class="font-bold">אוסטריה 2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
